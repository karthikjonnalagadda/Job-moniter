# Continuous integration: lint, type-check, test, build, and smoke-test.
# Deployment to Render is handled by Render's native autodeploy on push to
# `main` (see render.yaml `autoDeploy: true`), which picks up the commit only
# after this workflow is green on the branch.
name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  quality:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check app tests
      - name: Mypy type-check
        run: mypy app
      - name: Pytest
        run: pytest --cov=app
      - name: Smoke test (app imports & wires)
        run: python -c "from app.main import app; assert app.title"

  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t job-agent-api:ci .
      - name: Smoke test (container health)
        run: |
          docker run -d --name job-agent-ci -p 8000:8000 \
            -e JOBAGENT_VECTOR__BACKEND=numpy \
            -e JOBAGENT_MONGO__URI=mongodb://localhost:27017 \
            job-agent-api:ci
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then echo "healthy"; exit 0; fi
            sleep 2
          done
          echo "health check failed"; docker logs job-agent-ci; exit 1
