# Continuous integration: lint, type-check, test, and smoke-test on every push/PR.
#
# The container image is built and validated by Render on deploy (render.yaml,
# Docker runtime) and by `docker build` locally — it is intentionally NOT
# rebuilt here, to keep CI fast and its result deterministic. Deployment to
# Render happens via Render's native autodeploy on push to `main` after this
# workflow is green.
name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  quality:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check app tests
      - name: Mypy type-check
        run: mypy app
      - name: Pytest
        run: |
          set -o pipefail
          python -m pytest --cov=app -rA 2>&1 | tee pytest_output.txt
      - name: Surface pytest failure
        if: failure()
        run: |
          {
            echo '### Pytest failure (tail)';
            echo '```';
            tail -n 60 pytest_output.txt;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
          grep -E "FAILED|ERROR|Traceback|assert|Error" pytest_output.txt | tail -n 40 \
            | while IFS= read -r l; do echo "::error::${l}"; done
      - name: Smoke test (app imports & wires)
        run: python -c "from app.main import app; assert app.title"
