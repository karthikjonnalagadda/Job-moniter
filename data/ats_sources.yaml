# =============================================================================
# Source Registry — single source of truth for which sources exist.
# Loaded by app.registry.SourceRegistry (YAML | JSON | Mongo). No source is
# hardcoded in Python. Priority follows the Phase-4 order (1 = highest).
#
# Fields per source:
#   enabled       : bool  — master on/off switch
#   priority      : int   — routing/collection order (1 = highest)
#   source_type   : career_site | ats | job_board
#   legal_mode    : api | feed | scrape   (scrape => opt-in, never on by default)
#   rate_limit_rps: float — per-source request rate cap
#   ats_type      : the ATS platform (ATS sources only)
# =============================================================================

# ---- 1. Official career pages (robots-aware generic crawler) ----------------
career_site:     { enabled: true,  priority: 1,  source_type: career_site, legal_mode: scrape, rate_limit_rps: 0.5 }

